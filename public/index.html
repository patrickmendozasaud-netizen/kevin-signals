<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">

<title>Kevin Signals</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0f172a; --s1:#1e293b; --s2:#253047;
  --txt:#f1f5f9; --muted:#94a3b8;
  --blue:#3b82f6; --green:#22c55e; --red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--txt);
}

/* Top */
.topbar{
  padding:14px 18px;
  border-bottom:1px solid var(--s1);
  font-weight:800;
}

/* Tabs */
.tabs{
  display:flex;
  gap:6px;
  padding:10px;
  border-bottom:1px solid var(--s1);
}
.tab-btn{
  padding:8px 12px;
  background:transparent;
  border:none;
  color:var(--muted);
  cursor:pointer;
}
.tab-btn.active{
  background:var(--blue);
  color:white;
  border-radius:6px;
}

/* Layout */
.main{padding:16px}
.card{
  background:var(--s1);
  padding:12px;
  border-radius:10px;
  border:1px solid var(--s2);
  margin-bottom:10px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:10px;
}

/* Inputs */
textarea{
  width:100%;
  height:150px;
  margin:10px 0;
  background:#020617;
  color:white;
  border:1px solid var(--s2);
  padding:10px;
}

/* Buttons */
button{
  padding:8px 12px;
  border:none;
  background:var(--s2);
  color:white;
  cursor:pointer;
}
button.primary{background:var(--blue)}

/* Tabs hidden */
.tab{display:none}
</style>

</head>

<body>

<div class="topbar">Kevin Signals</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="import">Import</button>
  <button class="tab-btn" data-tab="stocks">Stocks</button>
  <button class="tab-btn" data-tab="portfolio">Portfolio</button>
  <button class="tab-btn" data-tab="videos">Videos</button>
  <button class="tab-btn" data-tab="earnings">Earnings</button>
</div>

<div class="main">

  <!-- IMPORT -->

  <div id="import" class="tab" style="display:block">
    <textarea id="report" placeholder="Paste report..."></textarea>
    <button id="parseBtn" class="primary">Parse</button>
    <div id="status"></div>
  </div>

  <!-- STOCKS -->

  <div id="stocks" class="tab">
    <button id="rankBtn">Rank</button>
    <div id="stocksGrid" class="grid"></div>
  </div>

  <!-- PORTFOLIO -->

  <div id="portfolio" class="tab">
    <div id="portfolioGrid" class="grid"></div>
  </div>

  <!-- VIDEOS -->

  <div id="videos" class="tab">
    <button id="refreshVideos">Refresh</button>
    <div id="videosList"></div>
    <div id="videoOut"></div>
  </div>

  <!-- EARNINGS -->

  <div id="earnings" class="tab">
    <button id="loadEarnings">Load</button>
    <div id="earningsOut" class="grid"></div>
  </div>

</div>

<!-- ERROR BAR -->

<div id="errBar" style="display:none;position:fixed;bottom:0;left:0;right:0;background:red;color:#fff;padding:8px;font-size:12px;"></div>

<script>
window.addEventListener("error", e=>{
  const bar=document.getElementById("errBar");
  bar.style.display="block";
  bar.textContent=e.message;
});
</script>

<!-- ✅ ONLY JS LOAD (IMPORTANT) -->

<script type="module" src="/js/app.js"></script>

</body>
</html>

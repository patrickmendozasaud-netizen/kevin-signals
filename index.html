<!DOCTYPE html>

<html>
<head>
<title>Kevin Signals AI Dashboard</title>

<style>
body { margin:0; font-family:Inter; background:#020617; color:#fff; }
.container { display:grid; grid-template-columns:220px 1fr; height:100vh; }

.sidebar { padding:15px; border-right:1px solid #1e293b; }
.sidebar button { width:100%; margin-bottom:8px; background:#0f172a; }
.sidebar button.active { background:#3b82f6; }

.main { padding:15px; overflow:auto; }

.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:10px; }

.card {
  background:#0f172a;
  padding:10px;
  border-radius:8px;
  border:1px solid #1e293b;
}

.up { color:#22c55e; }
.down { color:#ef4444; }

textarea,input {
  width:100%;
  margin:6px 0;
  padding:8px;
  background:#020617;
  color:#fff;
  border:1px solid #1e293b;
}

button {
  padding:8px;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
  background:#334155;
}
button:hover { background:#475569; }
</style>

</head>

<body>
<div class="container">

<div class="sidebar">
<button onclick="tab('import')" class="active">Import</button>
<button onclick="tab('stocks')">Stocks</button>
<button onclick="tab('portfolio')">AI Portfolio</button>
<button onclick="tab('videos')">Videos</button>
<button onclick="tab('earnings')">Earnings</button>
</div>

<div class="main">

<div id="import" class="tab">
<textarea id="report"></textarea>
<button onclick="parse()">Parse</button>
<div id="status"></div>
</div>

<div id="stocks" class="tab" style="display:none;">
<button onclick="sortStocks()">Sort by Movers</button>
<div id="stocksGrid" class="grid"></div>
</div>

<div id="portfolio" class="tab" style="display:none;">
<div id="portfolioGrid" class="grid"></div>
</div>

<div id="videos" class="tab" style="display:none;">
<input id="videoId" placeholder="YouTube ID">
<button onclick="video()">Analyze</button>
<div id="videoOut"></div>
</div>

<div id="earnings" class="tab" style="display:none;">
<button onclick="earnings()">Load</button>
<div id="earningsOut"></div>
</div>

</div>
</div>

<script>
const API="/api";

let STOCKS=[];
let prices={};
let portfolio=JSON.parse(localStorage.getItem("portfolio")||"[]");

// ---------- TAB ----------
function tab(n){
document.querySelectorAll('.tab').forEach(t=>t.style.display='none');
document.getElementById(n).style.display='block';
}

// ---------- PARSE ----------
async function parse(){
  const text = document.getElementById("report").value;

  const words = text.match(/\b[A-Z]{2,5}\b/g) || [];

  const blacklist = [
    "OPEN","VERY","TODAY","EXPECT","WEEK","MONTH","YEAR",
    "THIS","THAT","WITH","FROM","YOUR","KEVIN","BUY","SELL",
    "LIST","LONG","TERM","NOTE","MAKE","MAKES","MORE","OVER",
    "UNDER","AFTER","BEFORE","ABOUT","INTO","ONTO","FROM"
  ];

  const tickers = [...new Set(words)]
    .filter(w => !blacklist.includes(w));

  STOCKS = tickers.map(t => ({ ticker: t }));

  localStorage.setItem("stocks", JSON.stringify(STOCKS));

  document.getElementById("status").innerText = "✅ Parsed";

  fetchPrices();
}

// ---------- PRICES ----------
async function fetchPrices(){
if(!STOCKS.length) return;

const res=await fetch(API+"/prices",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({tickers:STOCKS.map(s=>s.ticker)})
});

prices=await res.json();

render();
renderPortfolio();
}

// ---------- RENDER STOCKS ----------
function render(){
  const el = document.getElementById("stocksGrid");

  if(!STOCKS.length){
    el.innerHTML = "No stocks loaded";
    return;
  }

  el.innerHTML = STOCKS.map(s=>{
    const p = prices[s.ticker]?.price ?? null;
    const prev = prices[s.ticker]?.prev ?? null;

    let change = 0;

    if (p && prev) {
      change = ((p - prev) / prev * 100).toFixed(2);
    }

    const priceDisplay = p ? `$${p}` : "—";
    const changeDisplay = p ? `(${change}%)` : "";

    return `
      <div class="card">
        <b>${s.ticker}</b><br>
        <span class="${change >= 0 ? 'up' : 'down'}">
          ${priceDisplay} ${changeDisplay}
        </span>
        <br>
        <button onclick="analyze('${s.ticker}',${p || 0})">AI Analyze</button>
        <div id="ai-${s.ticker}" style="font-size:12px;margin-top:6px;"></div>
      </div>
    `;
  }).join("");
}

// ---------- AI ANALYZE ----------
async function analyze(ticker,price){
const el=document.getElementById("ai-"+ticker);
el.innerText="Analyzing...";

try{
const res=await fetch(API+"/analyze-stock",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({ticker,price})
});

const d=await res.json();

el.innerHTML=`
<b>${d.decision}</b> (${d.confidence}%)
<br><small>${d.reason}</small>
<br>Entry: ${d.entry}
<br>Target: ${d.target}
<br>Stop: ${d.stop}
`;

if(d.decision==="BUY" && d.confidence>70){
aiBuy(ticker,price);
}

}catch(e){
el.innerText="❌ AI error";
}
}

// ---------- AUTO BUY ----------
function aiBuy(ticker,price){
if(portfolio.find(p=>p.ticker===ticker)) return;

portfolio.push({
ticker,
entry:price,
time:Date.now()
});

localStorage.setItem("portfolio",JSON.stringify(portfolio));
renderPortfolio();
}

// ---------- PORTFOLIO ----------
function renderPortfolio(){
document.getElementById("portfolioGrid").innerHTML=
portfolio.map(p=>{
const now=prices[p.ticker]?.price||p.entry;
const pnl=((now-p.entry)/p.entry*100).toFixed(2);

return `<div class="card">
${p.ticker}<br>
Entry: $${p.entry}<br>
Now: $${now}<br>
<span class="${pnl>0?'up':'down'}">${pnl}%</span>
</div>`;
}).join("");
}

// ---------- SORT ----------
function sortStocks(){
STOCKS.sort((a,b)=>{
const pa=prices[a.ticker]?.price||0;
const pb=prices[b.ticker]?.price||0;
return pb-pa;
});
render();
}

// ---------- VIDEO ----------
async function video(){
const id=document.getElementById("videoId").value;
const res=await fetch(API+"/analyze-video",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({videoId:id})
});
const d=await res.json();
document.getElementById("videoOut").innerText=d.summary;
}

// ---------- EARNINGS ----------
async function earnings(){
const res=await fetch(API+"/earnings");
const d=await res.json();
document.getElementById("earningsOut").innerHTML=
d.map(e=>`<div>${e.ticker}: ${e.summary}</div>`).join("");
}

// ---------- INIT ----------
setInterval(fetchPrices,30000);

window.onload=()=>{
const saved=localStorage.getItem("stocks");
if(saved){STOCKS=JSON.parse(saved);fetchPrices();}
renderPortfolio();
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Signals v3</title>

<style>
body {
  margin:0;
  font-family:Inter, sans-serif;
  background:#0f172a;
  color:#fff;
}
.container { padding:16px; }
.card {
  background:#1e293b;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}
button {
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:#fff;
  cursor:pointer;
}
textarea {
  width:100%;
  height:150px;
  background:#020617;
  color:#fff;
  border:1px solid #334155;
  border-radius:8px;
  padding:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Kevin Signals v3</h2>

<!-- IMPORT -->
<div class="card">
  <h3>Import Report</h3>
  <textarea id="report"></textarea>
  <button onclick="parseReport()">Parse</button>
</div>

<!-- STOCKS -->
<div class="card">
  <h3>Stocks</h3>
  <div id="stocks"></div>
</div>

<!-- VIDEOS -->
<div class="card">
  <h3>Video AI</h3>
  <input id="videoId" placeholder="YouTube Video ID"/>
  <button onclick="analyzeVideo()">Analyze</button>
  <div id="videoResult"></div>
</div>

<!-- EARNINGS -->
<div class="card">
  <h3>Earnings</h3>
  <button onclick="loadEarnings()">Load Earnings</button>
  <div id="earnings"></div>
</div>

</div>

<script>
const API = "https://YOUR_BACKEND_URL/api";

async function parseReport(){
  const text = document.getElementById('report').value;

  const res = await fetch(API+'/parse',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text})
  });

  const data = await res.json();

  localStorage.setItem('stocks', JSON.stringify(data.stocks));
  renderStocks(data.stocks);
}

async function renderStocks(stocks){
  const el = document.getElementById('stocks');
  el.innerHTML = 'Loading prices...';

  const res = await fetch(API+'/prices',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({tickers:stocks.map(s=>s.ticker)})
  });

  const prices = await res.json();

  el.innerHTML = stocks.map(s=>`
    <div class="card">
      <b>${s.ticker}</b> - $${prices[s.ticker] || '—'}
      <div>${s.signal}</div>
    </div>
  `).join('');
}

async function analyzeVideo(){
  const id = document.getElementById('videoId').value;

  const res = await fetch(API+'/analyze-video',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({videoId:id})
  });

  const data = await res.json();
  document.getElementById('videoResult').innerText = data.summary;
}

async function loadEarnings(){
  const res = await fetch(API+'/earnings');
  const data = await res.json();

  document.getElementById('earnings').innerHTML =
    data.map(e=>`<div>${e.ticker}: ${e.summary}</div>`).join('');
}
</script>

</body>
</html>

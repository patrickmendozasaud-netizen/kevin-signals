<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Signals v3</title>

<style>
body {
  margin:0;
  font-family:Inter, sans-serif;
  background:#0f172a;
  color:#fff;
}
.container { padding:16px; }
.card {
  background:#1e293b;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}
button {
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:#fff;
  cursor:pointer;
}
textarea {
  width:100%;
  height:150px;
  background:#020617;
  color:#fff;
  border:1px solid #334155;
  border-radius:8px;
  padding:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Kevin Signals v3</h2>

<!-- IMPORT -->
<div class="card">
  <h3>Import Report</h3>
  <textarea id="report"></textarea>
  <button onclick="parseReport()">Parse</button>
</div>

<!-- STOCKS -->
<div class="card">
  <h3>Stocks</h3>
  <div id="stocks"></div>
</div>

<!-- VIDEOS -->
<div class="card">
  <h3>Video AI</h3>
  <input id="videoId" placeholder="YouTube Video ID"/>
  <button onclick="analyzeVideo()">Analyze</button>
  <div id="videoResult"></div>
</div>

<!-- EARNINGS -->
<div class="card">
  <h3>Earnings</h3>
  <button onclick="loadEarnings()">Load Earnings</button>
  <div id="earnings"></div>
</div>

</div>

<script>
const API = "https://kevin-signals.vercel.app/api";

async function parseReport(){
  const text = document.getElementById("reportText").value;

  if(!text){
    alert("Paste report first");
    return;
  }

  document.getElementById("importStatus").innerHTML = "Parsing...";

  try{
    const res = await fetch(API_BASE + "/parse", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    // IMPORTANT: adjust based on your API response
    const parsed = typeof data.result === "string"
      ? JSON.parse(data.result)
      : data;

    STOCKS = parsed.stocks || [];

    localStorage.setItem("ks3_stocks", JSON.stringify(STOCKS));

    document.getElementById("importStatus").innerHTML = "✅ Parsed successfully";

    renderStocks();

  } catch(e){
    console.error(e);
    document.getElementById("importStatus").innerHTML = "❌ Parse failed";
  }
}

async function renderStocks(stocks){
  const el = document.getElementById('stocks');
  el.innerHTML = 'Loading prices...';

  const res = await fetch(API+'/prices',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({tickers:stocks.map(s=>s.ticker)})
  });

  const prices = await res.json();

  const p = priceData[s.ticker]?.price || "—";

  el.innerHTML = stocks.map(s=>`
    <div class="card">
      <b>${s.ticker}</b> - $${prices[s.ticker] || '—'}
      <div>${s.signal}</div>
    </div>
  `).join('');
}

async function analyzeVideo(videoId){
  if(!videoId){
    alert("Enter video ID");
    return;
  }

  try{
    const res = await fetch(API_BASE + "/analyze-video", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ videoId })
    });

    const data = await res.json();

    videoAnalysis[videoId] = data;

    localStorage.setItem("ks3_videoAnalysis", JSON.stringify(videoAnalysis));

    renderVideos();

  } catch(e){
    console.error(e);
    alert("Video analysis failed");
  }
}

async function loadEarnings(){
  const res = await fetch(API+'/earnings');
  const data = await res.json();

  document.getElementById('earnings').innerHTML =
    data.map(e=>`<div>${e.ticker}: ${e.summary}</div>`).join('');
}

async function fetchPrices(){
  if(!STOCKS.length) return;

  try{
    const res = await fetch(API_BASE + "/prices", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        tickers: STOCKS.map(s => s.ticker)
      })
    });

    const prices = await res.json();

    for(let t in prices){
      priceData[t] = {
        price: prices[t],
        ts: Date.now()
      };
    }

    renderStocks();

  } catch(e){
    console.error("Price fetch failed", e);
  }
}

async function loadEarnings(){
  try{
    const res = await fetch(API_BASE + "/earnings");
    const data = await res.json();

    const container = document.getElementById("earningsList");

    container.innerHTML = data.map(e => `
      <div class="stock-card">
        <div class="card-body">
          <div class="ticker">${e.ticker}</div>
          <div style="margin-top:6px;font-size:12px">
            ${e.summary}
          </div>
        </div>
      </div>
    `).join("");

  } catch(e){
    console.error(e);
  }
}

async function saveCloud(){
  await fetch(API_BASE + "/sync", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      stocks: STOCKS,
      meta: reportMeta
    })
  });
}

async function loadCloud(){
  const res = await fetch(API_BASE + "/sync");
  const data = await res.json();

  if(data.stocks){
    STOCKS = data.stocks;
    reportMeta = data.meta;
    renderAll();
  }
}
  setInterval(fetchPrices, 30000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Kevin Signals AI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin:0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background:#020617;
    color:#fff;
    -webkit-font-smoothing: antialiased;
  }
  .container { display:grid; grid-template-columns:220px 1fr; height:100vh; }
  @media (max-width: 720px) {
    .container { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height:auto; min-height:100vh; }
    .sidebar { display:flex; flex-wrap:wrap; gap:6px; padding:10px; border-right:0; border-bottom:1px solid #1e293b; }
    .sidebar .brand { width:100%; padding:4px 4px 8px; }
    .sidebar button { flex:1; min-width:90px; margin:0; }
  }
  .sidebar { padding:15px; border-right:1px solid #1e293b; background:#0a0f1f; }
  .sidebar .brand { font-weight:800; font-size:18px; padding:10px 4px 18px; color:#3b82f6; }
  .sidebar button { width:100%; margin-bottom:8px; background:#0f172a; text-align:left; padding:10px 12px; font-weight:500; transition: background .15s; }
  .sidebar button.active { background:#3b82f6; }
  .sidebar button:hover:not(.active) { background:#1e293b; }
  .main { padding:20px; overflow:auto; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:12px; margin-top:12px; }
  .card { background:#0f172a; padding:14px; border-radius:10px; border:1px solid #1e293b; }
  .card .ticker { font-size:18px; font-weight:700; }
  .card .price { font-family: ui-monospace, monospace; margin: 6px 0; }
  .up { color:#22c55e; } .down { color:#ef4444; }
  .ai-out { margin-top:8px; padding:6px 8px; border-radius:6px; background:#0a0f1f; font-size:12px; min-height:18px; }
  textarea, input {
    width:100%; margin:6px 0; padding:10px;
    background:#020617; color:#fff;
    border:1px solid #1e293b; border-radius:6px;
    font-family: inherit; font-size: 14px;
  }
  textarea { min-height: 200px; resize: vertical; }
  button {
    padding:10px 14px; border:none; border-radius:6px;
    color:white; cursor:pointer; background:#334155;
    font-family: inherit; font-weight: 500; transition: background .15s;
  }
  button:hover { background:#475569; }
  .status { margin-top:10px; font-size:13px; min-height:20px; }
  .status.ok { color:#22c55e; }
  .status.err { color:#ef4444; }
  h2 { margin-top:0; font-weight:700; }
  .empty { grid-column:1/-1; text-align:center; color:#94a3b8; padding:24px; }
</style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <div class="brand">Kevin Signals</div>
    <button onclick="tab('import')" class="active" data-tab="import">📥 Import</button>
    <button onclick="tab('stocks')" data-tab="stocks">📊 Stocks</button>
    <button onclick="tab('portfolio')" data-tab="portfolio">💼 AI Portfolio</button>
    <button onclick="tab('videos')" data-tab="videos">🎥 Videos</button>
    <button onclick="tab('earnings')" data-tab="earnings">📰 Earnings</button>
  </div>
  <div class="main">
    <div id="import" class="tab">
      <h2>Import Report</h2>
      <p style="color:#94a3b8;font-size:13px">Paste Kevin's Alpha Report. We'll detect tickers, fetch live prices, then you can ask the AI to analyze each one.</p>
      <textarea id="report" placeholder="Paste report text here…"></textarea>
      <button onclick="parse()">Parse Report</button>
      <div id="status" class="status"></div>
    </div>

    <div id="stocks" class="tab" style="display:none;">
      <h2>Stocks</h2>
      <button onclick="sortStocks()">↕ Sort by Movers</button>
      <div id="stocksGrid" class="grid"></div>
    </div>

    <div id="portfolio" class="tab" style="display:none;">
      <h2>AI Portfolio</h2>
      <p style="color:#94a3b8;font-size:13px">Stocks the AI rated BUY with confidence > 70%.</p>
      <div id="portfolioGrid" class="grid"></div>
    </div>

    <div id="videos" class="tab" style="display:none;">
      <h2>Video Analyzer</h2>
      <input id="videoId" placeholder="YouTube video ID or URL">
      <button onclick="video()">Analyze Video</button>
      <div id="videoOut" style="margin-top:12px"></div>
    </div>

    <div id="earnings" class="tab" style="display:none;">
      <h2>Earnings</h2>
      <button onclick="earnings()">Load Earnings</button>
      <div id="earningsOut" class="grid"></div>
    </div>
  </div>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>

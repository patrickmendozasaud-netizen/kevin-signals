<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kevin Signals v3</title>

<style>
body {
  margin:0;
  font-family:Inter, sans-serif;
  background:#0f172a;
  color:#fff;
}

.container { padding:16px; }

.card {
  background:#1e293b;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}

button {
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#334155;
  color:#fff;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  background:#475569;
}

button.active {
  background:#3b82f6;
}

textarea, input {
  width:100%;
  margin-top:6px;
  margin-bottom:8px;
  background:#020617;
  color:#fff;
  border:1px solid #334155;
  border-radius:8px;
  padding:10px;
}

/* FIXED: tabs CSS now INSIDE style */
.tabs {
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

.tabs button {
  flex:1;
}

.tab {
  display:none;
  animation: fade 0.2s ease;
}

.tab.active {
  display:block;
}

@keyframes fade {
  from { opacity:0; transform:translateY(5px); }
  to { opacity:1; transform:translateY(0); }
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Kevin Signals</h2>

<div class="tabs">
  <button onclick="showTab('import')" class="active">Import</button>
  <button onclick="showTab('stocks')">Stocks</button>
  <button onclick="showTab('videos')">Videos</button>
  <button onclick="showTab('earnings')">Earnings</button>
</div>

<!-- IMPORT -->
<div id="tab-import" class="tab">
  <div class="card">
    <h3>Import Report</h3>
    <textarea id="report"></textarea>
    <button onclick="parseReport()">Parse</button>
    <div id="importStatus"></div>
  </div>
</div>

<!-- STOCKS -->
<div id="tab-stocks" class="tab" style="display:none;">
  <div class="card">
    <h3>Stocks</h3>
    <div id="stocks"></div>
  </div>
</div>

<!-- VIDEOS -->
<div id="tab-videos" class="tab" style="display:none;">
  <div class="card">
    <h3>Video AI</h3>
    <input id="videoId" placeholder="YouTube Video ID"/>
    <button onclick="analyzeVideo()">Analyze</button>
    <div id="videoResult"></div>
  </div>
</div>

<!-- EARNINGS -->
<div id="tab-earnings" class="tab" style="display:none;">
  <div class="card">
    <h3>Earnings</h3>
    <button onclick="loadEarnings()">Load</button>
    <div id="earnings"></div>
  </div>
</div>

</div>

<script>

function showTab(name){
  // hide all tabs
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.remove('active');
  });

  // remove active from buttons
  document.querySelectorAll('.tabs button').forEach(b=>{
    b.classList.remove('active');
  });

  // show selected tab
  document.getElementById('tab-'+name).classList.add('active');

  // highlight active button
  document.querySelector(`.tabs button[onclick="showTab('${name}')"]`)
    .classList.add('active');
}
const API_BASE = "https://kevin-signals.vercel.app/api";

let STOCKS = [];
let priceData = {};

// ---------------- PARSE ----------------
async function parseReport(){
  const text = document.getElementById("report").value;

  if(!text){
    alert("Paste report first");
    return;
  }

  document.getElementById("importStatus").innerText = "Parsing...";

  try{
    const res = await fetch(API_BASE + "/parse", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    const parsed = await res.json();

    if(!parsed || !parsed.stocks){
      throw new Error("Invalid response");
    }

    STOCKS = parsed.stocks;

    localStorage.setItem("ks3_stocks", JSON.stringify(STOCKS));

    document.getElementById("importStatus").innerText = "✅ Parsed";

    renderStocks();
    fetchPrices();

  } catch(e){
    console.error(e);
    document.getElementById("importStatus").innerText = "❌ " + e.message;
  }
}

// ---------------- RENDER ----------------
function renderStocks(){
  const el = document.getElementById('stocks');

  if(!STOCKS.length){
    el.innerHTML = "No stocks yet";
    return;
  }

  el.innerHTML = STOCKS.map(s=>{
    const price = priceData[s.ticker]?.price || "—";

    return `
      <div class="card">
        <b>${s.ticker}</b> - $${price}
        <div>${s.signal || ""}</div>
      </div>
    `;
  }).join('');
}

// ---------------- PRICES ----------------
async function fetchPrices(){
  if(!STOCKS.length) return;

  try{
    const res = await fetch(API_BASE + "/prices", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        tickers: STOCKS.map(s => s.ticker)
      })
    });

    const prices = await res.json();

    for(let t in prices){
      priceData[t] = {
        price: prices[t],
        ts: Date.now()
      };
    }

    renderStocks();

  } catch(e){
    console.error("Price error", e);
  }
}

// ---------------- VIDEO ----------------
async function analyzeVideo(){
  const videoId = document.getElementById("videoId").value;

  if(!videoId){
    alert("Enter video ID");
    return;
  }

  const resultEl = document.getElementById("videoResult");
  resultEl.innerText = "Analyzing...";

  try{
    const res = await fetch(API_BASE + "/analyze-video", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ videoId })
    });

    const data = await res.json();

    resultEl.innerText = data.summary || "No summary";

  } catch(e){
    console.error(e);
    resultEl.innerText = "❌ Failed";
  }
}

// ---------------- EARNINGS ----------------
async function loadEarnings(){
  try{
    const res = await fetch(API_BASE + "/earnings");
    const data = await res.json();

    document.getElementById("earnings").innerHTML =
      data.map(e=>`
        <div class="card">
          <b>${e.ticker}</b>
          <div>${e.summary}</div>
        </div>
      `).join("");

  } catch(e){
    console.error(e);
  }
}

// ---------------- INIT ----------------
setInterval(fetchPrices, 30000);

window.onload = ()=>{
  showTab('import');
  const saved = localStorage.getItem("ks3_stocks");
  if(saved){
    STOCKS = JSON.parse(saved);
    renderStocks();
    fetchPrices();
  }
};
</script>

</body>
</html>
